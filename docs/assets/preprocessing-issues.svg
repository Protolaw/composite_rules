<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Route preprocessing issue classes</title>
  <desc id="desc">Schematic of reaction granularity, atom mapping artifacts, and false reactants handled during route preprocessing.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .body { font: 16px Arial, sans-serif; fill: #334155; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .tag { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .molecule { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 6; }
      .ok { fill: #dcfce7; stroke: #22c55e; stroke-width: 1.5; rx: 6; }
      .warn { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; rx: 6; }
      .bad { fill: #fee2e2; stroke: #ef4444; stroke-width: 1.5; rx: 6; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .dashed { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="420" fill="#f8fafc"/>

  <rect class="panel" x="24" y="28" width="292" height="352"/>
  <text class="title" x="48" y="66">Reaction granularity</text>
  <rect class="warn" x="48" y="96" width="104" height="42"/>
  <text class="tag" x="70" y="122">A-X-P</text>
  <line class="line" x1="160" y1="117" x2="216" y2="117"/>
  <rect class="warn" x="226" y="96" width="64" height="42"/>
  <text class="tag" x="244" y="122">B-X</text>
  <text class="small" x="48" y="166">Multicenter rule in one route step</text>
  <line class="dashed" x1="95" y1="192" x2="95" y2="226"/>
  <rect class="ok" x="48" y="238" width="92" height="40"/>
  <text class="tag" x="65" y="263">B-X-P</text>
  <line class="line" x1="148" y1="258" x2="202" y2="258"/>
  <rect class="ok" x="212" y="238" width="78" height="40"/>
  <text class="tag" x="232" y="263">B-X</text>
  <text class="body" x="48" y="318">Split only when the centers</text>
  <text class="body" x="48" y="342">represent sequential chemistry.</text>

  <rect class="panel" x="344" y="28" width="292" height="352"/>
  <text class="title" x="368" y="66">Mapping artifacts</text>
  <rect class="bad" x="368" y="100" width="104" height="44"/>
  <text class="tag" x="391" y="127">THP map</text>
  <line class="line" x1="482" y1="122" x2="532" y2="122"/>
  <rect class="bad" x="542" y="100" width="70" height="44"/>
  <text class="tag" x="560" y="127">split?</text>
  <text class="small" x="368" y="172">Graphormer-derived atom maps can</text>
  <text class="small" x="368" y="194">make one THP/DHP event appear</text>
  <text class="small" x="368" y="216">as two rule centers.</text>
  <line class="dashed" x1="490" y1="240" x2="490" y2="278"/>
  <rect class="ok" x="386" y="292" width="208" height="42"/>
  <text class="tag" x="414" y="318">keep as one reaction center</text>

  <rect class="panel" x="664" y="28" width="292" height="352"/>
  <text class="title" x="688" y="66">False reactants</text>
  <rect class="bad" x="688" y="96" width="88" height="42"/>
  <text class="tag" x="715" y="122">DMF</text>
  <line class="line" x1="784" y1="117" x2="838" y2="117"/>
  <rect class="warn" x="848" y="96" width="84" height="42"/>
  <text class="tag" x="866" y="122">Me-I</text>
  <text class="small" x="688" y="166">Solvent or unrelated building block</text>
  <text class="small" x="688" y="188">can be mapped as the reagent.</text>
  <rect class="ok" x="688" y="228" width="106" height="42"/>
  <text class="tag" x="710" y="254">correct</text>
  <line class="line" x1="802" y1="249" x2="852" y2="249"/>
  <rect class="ok" x="862" y="228" width="70" height="42"/>
  <text class="tag" x="881" y="254">split</text>
  <text class="body" x="688" y="318">Otherwise route is rejected</text>
  <text class="body" x="688" y="342">to the unresolved set.</text>
</svg>
